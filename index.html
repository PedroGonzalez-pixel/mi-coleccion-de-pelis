<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mi colección de películas - Bienvenido a mi página personal">
    <title>Mi Colección de Pelis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.6;
        }
        
        main {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        section {
            padding: 40px;
        }
        
        p {
            color: #555;
            font-size: 1.05rem;
            margin-bottom: 20px;
        }
        
        footer {
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.9rem;
            border-top: 1px solid #ddd;
        }
        
        a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>🎬 Mi Colección de Pelis</h1>
            <p class="subtitle">Bienvenido a mi página</p>
        </header>
        
        <section>
            <p>Esta es una página HTML moderna y responsive.</p>
            <p>¡Puedes agregar tu colección de películas aquí!</p>
        </section>
        
        <footer>
            <p>&copy; 2026 Mi Colección de Películas. Todos los derechos reservados.</p>
        </footer>
    </main>
</body>
</html>
