<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Colección de Pelis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">🎬</div>
      <h1>Mi Colección<br>de Pelis</h1>
      <p id="login-subtitle"></p>
      <div class="lang-switcher login-lang">
        <button class="lang-btn active" data-lang="fr">🇫🇷 FR</button>
        <button class="lang-btn" data-lang="es">🇪🇸 ES</button>
        <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
      </div>
      <button id="btn-login">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 29.9 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/>
        </svg>
        <span id="login-btn-text"></span>
      </button>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <header>
      <h1>🎬 Mi Colección</h1>
      <div class="header-right">
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="fr">🇫🇷</button>
          <button class="lang-btn" data-lang="es">🇪🇸</button>
          <button class="lang-btn" data-lang="en">🇬🇧</button>
        </div>
        <span id="user-email"></span>
        <button id="btn-logout"></button>
      </div>
    </header>

    <!-- SEARCH -->
    <div class="search-section">
      <div class="search-bar">
        <input type="text" id="search-input" autocomplete="off"/>
        <button id="btn-search"></button>
      </div>
      <div id="search-results" class="hidden"></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" data-tab="to_watch">
        <span id="tab-to-watch-label"></span> <span id="count-to-watch">0</span>
      </button>
      <button class="tab" data-tab="watched">
        <span id="tab-watched-label"></span> <span id="count-watched">0</span>
      </button>
    </div>

    <!-- TOOLBAR: sort + filter + view -->
    <div class="toolbar">
      <div class="toolbar-left">
        <!-- Sort -->
        <select id="sort-select" class="tb-select"></select>
        <!-- Genre filter -->
        <select id="genre-select" class="tb-select"></select>
      </div>
      <div class="toolbar-right">
        <!-- View toggle -->
        <button class="view-btn active" id="btn-gallery" title="Galerie">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="9" height="9" rx="1.5"/><rect x="13" y="2" width="9" height="9" rx="1.5"/><rect x="2" y="13" width="9" height="9" rx="1.5"/><rect x="13" y="13" width="9" height="9" rx="1.5"/></svg>
        </button>
        <button class="view-btn" id="btn-list" title="Liste">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="4" width="20" height="2.5" rx="1.25"/><rect x="2" y="10.75" width="20" height="2.5" rx="1.25"/><rect x="2" y="17.5" width="20" height="2.5" rx="1.25"/></svg>
        </button>
      </div>
    </div>

    <!-- MOVIE LISTS -->
    <div id="list-to_watch" class="movie-grid"></div>
    <div id="list-watched" class="movie-grid hidden"></div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
